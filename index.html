<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiszki - Zwierzatka</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Minecraft Zgadywanki Po Angielsku</h1>
      </header>

      <section class="card-section">
        <div class="card-layout">
          <button id="prevBtn" type="button" class="side-btn">Poprzednia</button>

          <div class="flashcard" id="flashcard" aria-label="Fiszka">
            <article class="flashcard-face flashcard-front">
              <label for="answerInput" class="answer-label">Wpisz po angielsku:</label>
              <input
                id="answerInput"
                class="answer-input"
                type="text"
                autocomplete="off"
                autocapitalize="off"
                spellcheck="false"
              />
              <p id="letterFeedback" class="letter-feedback" aria-live="polite"></p>
              <img id="frontImage" src="" alt="" class="card-image" />
              <h2 id="polishWord"></h2>
            </article>
            <article class="flashcard-face flashcard-back">
              <img id="backImage" src="" alt="" class="card-image" />
              <h2 id="englishWord"></h2>
            </article>
          </div>

          <button id="nextBtn" type="button" class="side-btn">Nastepna</button>
        </div>
      </section>

      <nav class="controls" aria-label="Sterowanie fiszkami">
        <span id="progress" aria-live="polite"></span>
      </nav>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
