<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fiszki - Zwierzatka</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <button id="albumBtn" type="button" class="album-btn">Album</button>
    <main class="app">
      <header class="header">
        <h1>Minecraft Zgadywanki Po Angielsku</h1>
      </header>

      <section id="gameView" class="card-section view-section">
        <div class="card-layout">
          <button id="prevBtn" type="button" class="side-btn">Poprzednia</button>

          <div class="flashcard" id="flashcard" aria-label="Fiszka">
            <article class="flashcard-face flashcard-front">
              <label for="answerInput" class="answer-label">Wpisz po angielsku:</label>
              <div class="answer-input-wrap">
                <div id="answerColored" class="answer-colored" aria-hidden="true"></div>
                <input
                  id="answerInput"
                  class="answer-input"
                  type="text"
                  autocomplete="off"
                  autocapitalize="off"
                  spellcheck="false"
                />
              </div>
              <img id="frontImage" src="" alt="" class="card-image" />
              <h2 id="polishWord"></h2>
            </article>
            <article class="flashcard-face flashcard-back">
              <img id="backImage" src="" alt="" class="card-image" />
              <h2 id="englishWord"></h2>
            </article>
          </div>

          <button id="nextBtn" type="button" class="side-btn">Nastepna</button>
        </div>
        <nav id="gameControls" class="controls" aria-label="Sterowanie fiszkami">
          <span id="progress" aria-live="polite"></span>
        </nav>
        <section class="unlock-progress" aria-label="Postep odblokowania kart">
          <p id="unlockProgressText" class="unlock-progress-text">Odblokowane: 0/0</p>
          <div class="unlock-progress-track" aria-hidden="true">
            <div id="unlockProgressFill" class="unlock-progress-fill"></div>
          </div>
        </section>
      </section>

      <section id="albumView" class="album-view view-section is-hidden" aria-live="polite">
        <div class="album-header">
          <h2>Album odblokowanych kart</h2>
          <button id="backToGameBtn" type="button">Powrot do gry</button>
        </div>
        <div id="albumListView">
          <p id="albumEmptyState" class="album-empty">Brak odblokowanych kart.</p>
          <div id="albumGrid" class="album-grid"></div>
        </div>
        <div id="albumPreviewView" class="album-preview is-hidden">
          <button id="backToGalleryBtn" type="button">Powrot do galerii</button>
          <article class="album-preview-card">
            <img id="albumPreviewImage" src="" alt="" class="album-preview-image" />
            <p id="albumPreviewTitle" class="album-preview-title"></p>
          </article>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
